<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>$TRPZ Presale – TerpzyVerse</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@walletconnect/web3-provider@1.7.8/dist/umd/index.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/web3@1.6.1/dist/web3.min.js"></script>
</head>
<body>
  <div class="container">
    <img src="assets/trpz-coin.gif" alt="$TRPZ Coin" class="coin" />
    <h1>Join the $TRPZ Presale</h1>
    <p>Price: <strong>$1 per TRPZ</strong> • Supply: <strong>250,000</strong></p>
    <p>Send MATIC to:<br><code>0x8b67348306785692201fC328a7E954A178A42E62</code></p>
    
    <div id="countdown"></div>

    <form id="signup-form">
      <input type="email" placeholder="Your Email" required />
      <input type="text" placeholder="Your Wallet Address" required />
      <button type="submit">Join OG List</button>
    </form>

    <div id="wallet-connect">
      <button id="connectMetaMask">Connect MetaMask</button>
      <button id="connectCoinbase">Connect Coinbase</button>
    </div>
  </div>
</body>
</html>
